<!DOCTYPE html>
<html>
<head>
    <title>Code Solved Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card { border-radius: 10px; overflow: hidden; }
        .stats-card { text-align: center; padding: 20px; border-radius: 10px; color: white; }
        .bg-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-success { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .bg-info { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
        .progress { height: 30px; border-radius: 15px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        h1 { color: #667eea; font-weight: bold; }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">📊 Code Solved Tracker</h1>
        
        <div class="row mb-4" id="stats">
            <div class="col-md-4">
                <div class="stats-card bg-primary">
                    <h5>Total Solved</h5>
                    <h2 id="totalSolved" class="display-4">---</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card bg-success">
                    <h5>Success Rate</h5>
                    <h2 id="successRate" class="display-4">---</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card bg-info">
                    <h5>Categories</h5>
                    <h2 id="categoriesCount" class="display-4">---</h2>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">📈 Problems by Category</h5>
                    </div>
                    <div class="card-body" id="categories">
                        <div class="text-center">Loading data...</div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">🤖 AI Skill Analysis</h5>
                    </div>
                    <div class="card-body" id="skillGap">
                        <div class="text-center">Analyzing your skills...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">🕐 Recent Activity</h5>
                    </div>
                    <div class="card-body" id="recentActivity">
                        <div class="text-center">Loading activity...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // LIVE API URL - Replace with your actual Render API URL
        const apiUrl = 'https://codesolvedtracker.onrender.com';
        
        async function loadDashboard() {
            try {
                console.log('Calling API:', apiUrl + '/api/stats/dashboard');
                const response = await fetch(apiUrl + '/api/stats/dashboard');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                
                document.getElementById('totalSolved').innerHTML = data.totalSolved;
                document.getElementById('successRate').innerHTML = data.successRate.toFixed(1) + '%';
                document.getElementById('categoriesCount').innerHTML = data.byCategory.length;
                
                let categoriesHtml = '';
                for (let cat of data.byCategory) {
                    let percentage = Math.min((cat.count / 100) * 100, 100);
                    categoriesHtml += '<div class="mb-3">';
                    categoriesHtml += '<div class="d-flex justify-content-between mb-1">';
                    categoriesHtml += '<strong>' + cat.category + '</strong>';
                    categoriesHtml += '<span>' + cat.count + ' problems</span>';
                    categoriesHtml += '</div>';
                    categoriesHtml += '<div class="progress">';
                    categoriesHtml += '<div class="progress-bar bg-success" style="width: ' + percentage + '%">';
                    categoriesHtml += percentage.toFixed(0) + '%';
                    categoriesHtml += '</div></div></div>';
                }
                document.getElementById('categories').innerHTML = categoriesHtml;
                
                const skillResponse = await fetch(apiUrl + '/api/predictions/skill-gap');
                const skillData = await skillResponse.json();
                
                let gapPercent = (skillData.gapScore * 100).toFixed(0);
                let skillHtml = '<div class="alert alert-warning">';
                skillHtml += '<h6>⚠️ Weakest Area: <strong>' + skillData.category + '</strong></h6>';
                skillHtml += '<div class="progress mb-2">';
                skillHtml += '<div class="progress-bar bg-danger" style="width: ' + gapPercent + '%">';
                skillHtml += 'Gap: ' + gapPercent + '%';
                skillHtml += '</div></div>';
                skillHtml += '<small>' + skillData.recommendation + '</small>';
                skillHtml += '</div>';
                skillHtml += '<button class="btn btn-primary w-100" onclick="loadPracticePlan()">Generate Practice Plan →</button>';
                skillHtml += '<div id="practicePlan" class="mt-3"></div>';
                document.getElementById('skillGap').innerHTML = skillHtml;
                
                let activityHtml = '<table class="table table-striped">';
                activityHtml += '<thead><tr><th>Problem</th><th>Date</th><th>Status</th></tr></thead><tbody>';
                for (let act of data.recentActivity.slice(0, 10)) {
                    let statusClass = act.status === 'Accepted' ? 'badge bg-success' : 'badge bg-danger';
                    let date = new Date(act.solvedAt).toLocaleString();
                    activityHtml += '<tr>';
                    activityHtml += '<td>' + act.problemTitle + '</td>';
                    activityHtml += '<td>' + date + '</td>';
                    activityHtml += '<td><span class="' + statusClass + '">' + act.status + '</span></td>';
                    activityHtml += '</tr>';
                }
                activityHtml += '</tbody></table>';
                document.getElementById('recentActivity').innerHTML = activityHtml;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('categories').innerHTML = '<div class="alert alert-danger">⚠️ Cannot connect to API: ' + apiUrl + '</div>';
                document.getElementById('skillGap').innerHTML = '<div class="alert alert-danger">⚠️ API connection failed</div>';
                document.getElementById('recentActivity').innerHTML = '<div class="alert alert-danger">⚠️ Cannot load activity data</div>';
            }
        }
        
        async function loadPracticePlan() {
            try {
                const response = await fetch(apiUrl + '/api/predictions/practice-plan');
                const plan = await response.json();
                
                let problemsHtml = '<ul class="list-group mt-2">';
                for (let p of plan.suggestedProblems) {
                    problemsHtml += '<li class="list-group-item">';
                    problemsHtml += '<strong>' + p.title + '</strong>';
                    problemsHtml += '<span class="badge bg-secondary ms-2">' + p.category + '</span>';
                    problemsHtml += '<span class="badge bg-info ms-2">' + p.difficulty + '</span>';
                    problemsHtml += '</li>';
                }
                problemsHtml += '</ul>';
                
                document.getElementById('practicePlan').innerHTML = 
                    '<div class="alert alert-success mt-3">' +
                    '<h6>📝 ' + plan.focus + '</h6>' +
                    '<p><strong>Estimated Time:</strong> ' + plan.estimatedTime + '</p>' +
                    problemsHtml +
                    '</div>';
            } catch (error) {
                alert('Error loading practice plan: ' + error.message);
            }
        }
        
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>

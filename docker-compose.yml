version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: CodeSolvedTracker.API/Dockerfile
    ports:
      - "5173:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/codingtracker.db
    volumes:
      - ./data:/app/data
    networks:
      - codetracker

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./CodeSolvedTracker.Frontend/wwwroot:/usr/share/nginx/html:ro
    networks:
      - codetracker

networks:
  codetracker:
    driver: bridge

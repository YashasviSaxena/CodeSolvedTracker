services:
  # API Service - Using Docker
  - type: web
    name: codetracker-api
    runtime: image
    plan: free
    dockerfilePath: ./CodeSolvedTracker.API/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000

  # Frontend Dashboard - Static Site
  - type: web
    name: codetracker-dashboard
    runtime: static
    plan: free
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./CodeSolvedTracker.Frontend/wwwroot
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

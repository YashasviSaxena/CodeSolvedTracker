## 🤖 AI-Powered Insights
The ML.NET model analyzes your performance and identifies:
- **Weakest Area:** Dynamic Programming (43% success rate)
- **Gap Score:** 77% improvement needed
- **Recommendation:** Focus on DP patterns: Fibonacci, Knapsack, LCS
- **Practice Plan:** 5 customized DP problems with difficulty levels

## 🛠️ Tech Stack
- **Backend:** ASP.NET Core 10, Entity Framework Core, SQLite
- **AI/ML:** ML.NET for skill prediction
- **Frontend:** HTML/CSS/JS, Bootstrap
- **Database:** SQLite with 658+ submissions

## 🚀 Quick Start

### 1. Run the API
```bash
cd CodeSolvedTracker.API
dotnet run
cd C:\Users\hp\OneDrive\Desktop\Yashasvi\NetPractice\CodeSolvedTracker

@'
services:
  # API Service - ASP.NET Core Backend
  - type: web
    name: codetracker-api
    runtime: dotnet
    repo: https://github.com/YashasviSaxena/CodeSolvedTracker
    plan: free
    buildCommand: |
      dotnet restore
      dotnet publish CodeSolvedTracker.API/CodeSolvedTracker.API.csproj -c Release -o publish
    startCommand: dotnet publish/CodeSolvedTracker.API.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
    healthCheckPath: /health

  # Frontend Dashboard - Static Site
  - type: web
    name: codetracker-dashboard
    runtime: static
    repo: https://github.com/YashasviSaxena/CodeSolvedTracker
    plan: free
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./CodeSolvedTracker.Frontend/wwwroot
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Database - PostgreSQL (for production)
  - type: pgsql
    name: codetracker-db
    plan: free
    databaseName: codingtracker
    user: codetracker

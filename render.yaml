# 📊 Code Solved Tracker - AI-Powered Coding Practice Analytics

[![GitHub stars](https://img.shields.io/github/stars/YashasviSaxena/CodeSolvedTracker)](https://github.com/YashasviSaxena/CodeSolvedTracker/stargazers)
[![MIT License](https://img.shields.io/badge/License-MIT-green.svg)](https://opensource.org/licenses/MIT)

## 🎯 Project Overview
A full-stack application that tracks coding practice and uses **ML.NET AI** to identify skill gaps and generate personalized practice plans.

## 📊 Live Demo
- **API Swagger:** http://localhost:5173/swagger
- **Dashboard:** Open `CodeSolvedTracker.Frontend/wwwroot/index.html`

